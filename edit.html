<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EASTER PUBLISHER PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ffaa00; --sec: #ff55ff; --bg: #0a0510; }
        body { 
            background: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin:0; padding: 20px;
            background-image: 
                linear-gradient(rgba(255, 170, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 85, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        h1 { 
            font-family: 'VT323', monospace; font-size: 70px; margin-bottom: 20px; 
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 4px 4px 0 var(--main), -4px -4px 0 var(--sec);
            text-align: center;
        }
        
        .container {
            background: rgba(30, 10, 46, 0.85); backdrop-filter: blur(15px);
            border: 3px solid var(--main); padding: 40px;
            border-radius: 30px; width: 1200px; max-width: 95%;
            box-shadow: 0 0 70px rgba(255, 170, 0, 0.3);
            position: relative; overflow: hidden;
        }

        .container::before { content: '🥚'; position: absolute; top: 10px; right: 20px; font-size: 30px; animation: pulse 1s infinite alternate; }
        .container::after { content: '🐰'; position: absolute; bottom: 10px; left: 20px; font-size: 30px; animation: float 2s infinite alternate; }
        @keyframes pulse { to { transform: scale(1.3); } }
        @keyframes float { to { transform: translateY(-15px); } }

        .columns-wrapper {
            display: flex; gap: 20px; margin-bottom: 20px; width: 100%;
        }
        .col { flex: 1; display: flex; flex-direction: column; }

        label { display: block; font-family: 'VT323'; font-size: 32px; color: var(--sec); margin-bottom: 10px; text-shadow: 2px 2px #000; }
        
        input[type="text"], textarea {
            width: 100%; background: #000; border: 2px solid #442255; color: #fff; padding: 20px;
            font-family: 'VT323', monospace; font-size: 22px; border-radius: 15px; box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,1); transition: 0.3s; resize: vertical; min-height: 300px;
            line-height: 1.5;
        }
        input[type="text"] { min-height: auto; margin-bottom: 30px; }
        input[type="text"]:focus, textarea:focus { border-color: var(--sec); outline: none; box-shadow: 0 0 20px var(--sec); }
        
        .options-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 18px; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--main); }

        .pub-btn {
            background: linear-gradient(45deg, var(--main), var(--sec)); color: #000; border: none;
            padding: 25px; font-size: 36px; font-weight: 900; font-family: 'VT323'; width: 100%; cursor: pointer;
            border-radius: 15px; text-transform: uppercase; transition: 0.2s;
            box-shadow: 0 10px 30px rgba(255, 170, 0, 0.4); margin-top: 20px;
        }
        .pub-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .pub-btn:disabled { filter: grayscale(1); cursor: wait; opacity: 0.5; }

        #output { margin-top: 30px; display: none; background: #000; padding: 25px; border-radius: 15px; border: 2px dashed var(--sec); width: 1200px; max-width: 95%;}
        #status { text-align: center; color: var(--sec); font-family: 'VT323'; font-size: 28px; margin-top: 20px; min-height: 35px; }
        .copy-info { color: #888; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<h1>🐰 ОХОТА НА ЯЙЦА: РЕДАКТОР 🐰</h1>

<div class="container">
    <label>ФИНАЛЬНОЕ ПОЗДРАВЛЕНИЕ (Английский используется по умолчанию, если не задано):</label>
    <input type="text" id="endMsg" value="ТЫ НАШЕЛ ВСЕ ЯЙЦА! С ПАСХОЙ!" placeholder="Текст победы...">

    <div class="columns-wrapper">
        <div class="col">
            <label>Вопросы</label>
            <textarea id="col-q" placeholder="Каждая строка — один вопрос
(Для картинки добавьте [http://ссылка.jpg] в текст)"></textarea>
        </div>
        <div class="col">
            <label>Правильные ответы</label>
            <textarea id="col-c" placeholder="Каждая строка — ответ для вопроса слева"></textarea>
        </div>
        <div class="col">
            <label>Неправильные ответы</label>
            <textarea id="col-w" placeholder="Опционально: неверные ответы через |
Например: cat | cap | map"></textarea>
        </div>
    </div>

    <div class="options-row">
        <input type="checkbox" id="opt-steal" checked>
        <label for="opt-steal" style="font-family: 'Montserrat'; font-size: 16px; margin:0; text-shadow: none;">Брать неверные ответы из правильных других вопросов, если строка пустая</label>
    </div>
    <div class="options-row">
        <input type="checkbox" id="opt-rand">
        <label for="opt-rand" style="font-family: 'Montserrat'; font-size: 16px; margin:0; text-shadow: none;">Рандомный порядок вопросов в игре</label>
    </div>

    <button id="pubBtn" class="pub-btn" onclick="publish()">ОПУБЛИКОВАТЬ КВЕСТ</button>
    <div id="status"></div>
</div>

<div id="output">
    <p class="copy-info">СКОПИРУЙТЕ ЭТОТ КОД ДЛЯ ВСТАВКИ (IFRAME):</p>
    <textarea id="finalCode" rows="4" readonly style="font-size: 16px; color: #0f0; margin-bottom: 0; min-height: 100px;"></textarea>
</div>

<script>
    async function publish() {
        const btn = document.getElementById('pubBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        
        const qs = document.getElementById('col-q').value.split('\n').map(s=>s.trim());
        const cs = document.getElementById('col-c').value.split('\n').map(s=>s.trim());
        const ws = document.getElementById('col-w').value.split('\n').map(s=>s.trim());
        
        const autoSteal = document.getElementById('opt-steal').checked;
        const randomize = document.getElementById('opt-rand').checked;

        let tasks = [];
        let allCorrects = cs.filter(c => c !== "");

        for(let i = 0; i < qs.length; i++) {
            if(!qs[i]) continue;
            
            let qText = qs[i];
            let cText = cs[i] || "Correct Answer";
            
            let imgUrl = "";
            let imgMatch = qText.match(/\[(.*?)\]/);
            if(imgMatch) {
                imgUrl = imgMatch[1];
                qText = qText.replace(imgMatch[0], '').trim();
            }

            let wrongArr = [];
            if(ws[i]) {
                wrongArr = ws[i].split('|').map(s=>s.trim()).filter(Boolean);
            } else if (autoSteal) {
                let others = allCorrects.filter(c => c !== cText);
                others.sort(() => 0.5 - Math.random());
                wrongArr = others.slice(0, 3);
            }

            tasks.push({
                question: qText,
                img: imgUrl,
                correct: cText,
                wrong: wrongArr
            });
        }

        if(randomize) tasks.sort(() => 0.5 - Math.random());

        if(tasks.length === 0) {
            status.innerText = "ОШИБКА: Добавьте хотя бы одно задание!";
            status.style.color = "#ff0000";
            return;
        }

        btn.disabled = true;
        status.innerText = "СБОРКА ДАННЫХ...";
        status.style.color = "var(--sec)";

        const gameId = 'easter-' + Math.random().toString(36).substr(2, 9);
        const data = {
            endMessage: document.getElementById('endMsg').value,
            eggs: tasks
        };

        try {
            status.innerText = "СОХРАНЯЕМ КВЕСТ...";
            
            const res = await fetch('https://publisher-server-ihqm.onrender.com/publish', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Publish-Key': 'super-secret-123' 
                },
                body: JSON.stringify({ 
                    id: gameId, 
                    folder: 'data', 
                    data: data 
                })
            });

            if(!res.ok) throw new Error("Сервер не ответил (код: " + res.status + ")");

            status.innerText = "ГОТОВО! ИГРА СОЗДАЁТСЯ...";
            status.style.color = "#00ff00";

            const url = `https://kgbgamelab.github.io/67/hp/index.html?id=${gameId}`;
            const iframe = `<iframe src="${url}" width="100%" height="100%" style="border:none; position:fixed; top:0; left:0;" allow="autoplay"></iframe>`;
            
            output.style.display = 'block';
            document.getElementById('finalCode').value = iframe;

        } catch(e) {
            status.innerText = "ОШИБКА: " + e.message;
            status.style.color = "#ff0000";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
