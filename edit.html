<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EASTER PUBLISHER PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ffaa00; --sec: #ff55ff; --bg: #0a0510; }
        body { 
            background: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin:0; padding: 20px;
            background-image: 
                linear-gradient(rgba(255, 170, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 85, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        h1 { 
            font-family: 'VT323', monospace; font-size: 70px; margin-bottom: 20px; 
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 4px 4px 0 var(--main), -4px -4px 0 var(--sec);
            text-align: center;
        }
        
        .container {
            background: rgba(30, 10, 46, 0.85); backdrop-filter: blur(15px);
            border: 3px solid var(--main); padding: 40px;
            border-radius: 30px; width: 1200px; max-width: 95%;
            box-shadow: 0 0 70px rgba(255, 170, 0, 0.3);
            position: relative; overflow: hidden;
        }

        .container::before { content: '🥚'; position: absolute; top: 10px; right: 20px; font-size: 30px; animation: pulse 1s infinite alternate; }
        .container::after { content: '🐰'; position: absolute; bottom: 10px; left: 20px; font-size: 30px; animation: float 2s infinite alternate; }
        @keyframes pulse { to { transform: scale(1.3); } }
        @keyframes float { to { transform: translateY(-15px); } }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .lang-select {
            background: #000; color: var(--sec); font-family: 'VT323', monospace; font-size: 24px;
            padding: 8px 15px; border: 2px solid var(--main); border-radius: 10px; cursor: pointer;
            outline: none;
        }
        .lang-select:focus { box-shadow: 0 0 15px var(--main); }

        .columns-wrapper {
            display: flex; gap: 20px; margin-bottom: 20px; width: 100%;
        }
        .col { flex: 1; display: flex; flex-direction: column; }

        label { display: block; font-family: 'VT323'; font-size: 32px; color: var(--sec); margin-bottom: 10px; text-shadow: 2px 2px #000; }
        
        input[type="text"], textarea {
            width: 100%; background: #000; border: 2px solid #442255; color: #fff; padding: 20px;
            font-family: 'VT323', monospace; font-size: 22px; border-radius: 15px; box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,1); transition: 0.3s; resize: vertical; min-height: 300px;
            line-height: 1.5;
        }
        input[type="text"] { min-height: auto; margin-bottom: 30px; }
        input[type="text"]:focus, textarea:focus { border-color: var(--sec); outline: none; box-shadow: 0 0 20px var(--sec); }
        
        .options-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 18px; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--main); flex-shrink: 0; }

        .pub-btn {
            background: linear-gradient(45deg, var(--main), var(--sec)); color: #000; border: none;
            padding: 25px; font-size: 36px; font-weight: 900; font-family: 'VT323'; width: 100%; cursor: pointer;
            border-radius: 15px; text-transform: uppercase; transition: 0.2s;
            box-shadow: 0 10px 30px rgba(255, 170, 0, 0.4); margin-top: 20px;
        }
        .pub-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .pub-btn:disabled { filter: grayscale(1); cursor: wait; opacity: 0.5; }

        #output { margin-top: 30px; display: none; background: #000; padding: 25px; border-radius: 15px; border: 2px dashed var(--sec); width: 1200px; max-width: 95%;}
        #status { text-align: center; color: var(--sec); font-family: 'VT323'; font-size: 28px; margin-top: 20px; min-height: 35px; }
        .copy-info { color: #888; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<h1 id="title-main">🐰 ОХОТА НА ЯЙЦА: РЕДАКТОР 🐰</h1>

<div class="container">
    <div class="top-bar">
        <label id="lbl-end" style="margin:0;">ФИНАЛЬНОЕ ПОЗДРАВЛЕНИЕ:</label>
        <select id="lang-select" class="lang-select">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
        </select>
    </div>
    
    <input type="text" id="endMsg" value="ТЫ НАШЕЛ ВСЕ ЯЙЦА! С ПАСХОЙ!" placeholder="Текст победы...">

    <div class="columns-wrapper">
        <div class="col">
            <label id="lbl-q">Вопросы</label>
            <textarea id="col-q" placeholder="Каждая строка — один вопрос
(Для картинки добавьте [http://ссылка.jpg] в текст)"></textarea>
        </div>
        <div class="col">
            <label id="lbl-c">Правильные ответы</label>
            <textarea id="col-c" placeholder="Каждая строка — ответ для вопроса слева"></textarea>
        </div>
        <div class="col">
            <label id="lbl-w">Неправильные ответы</label>
            <textarea id="col-w" placeholder="Опционально: неверные ответы через |
Например: cat | cap | map"></textarea>
        </div>
    </div>

    <div class="options-row">
        <input type="checkbox" id="opt-steal" checked>
        <label for="opt-steal" id="lbl-steal" style="font-family: 'Montserrat'; font-size: 16px; margin:0; text-shadow: none; color: white;">Брать неверные ответы из правильных других вопросов, если строка пустая</label>
    </div>
    <div class="options-row">
        <input type="checkbox" id="opt-rand">
        <label for="opt-rand" id="lbl-rand" style="font-family: 'Montserrat'; font-size: 16px; margin:0; text-shadow: none; color: white;">Рандомный порядок вопросов в игре</label>
    </div>

    <button id="pubBtn" class="pub-btn" onclick="publish()">ОПУБЛИКОВАТЬ КВЕСТ</button>
    <div id="status"></div>
</div>

<div id="output">
    <p class="copy-info" id="lbl-copy">СКОПИРУЙТЕ ЭТОТ КОД ДЛЯ ВСТАВКИ (IFRAME):</p>
    <textarea id="finalCode" rows="4" readonly style="font-size: 16px; color: #0f0; margin-bottom: 0; min-height: 100px;"></textarea>
</div>

<script>
    const i18nEditor = {
        ru: { title: "🐰 ОХОТА НА ЯЙЦА: РЕДАКТОР 🐰", endLbl: "ФИНАЛЬНОЕ ПОЗДРАВЛЕНИЕ:", endPl: "Текст победы...", qLbl: "Вопросы", qPl: "Каждая строка — один вопрос\n(Для картинки добавьте [http://ссылка.jpg] в текст)", cLbl: "Правильные ответы", cPl: "Каждая строка — ответ для вопроса слева", wLbl: "Неправильные ответы", wPl: "Опционально: неверные ответы через |\nНапример: cat | cap | map", stealLbl: "Брать неверные ответы из правильных других вопросов, если строка пустая", randLbl: "Рандомный порядок вопросов в игре", pubBtn: "ОПУБЛИКОВАТЬ КВЕСТ", copy: "СКОПИРУЙТЕ ЭТОТ КОД ДЛЯ ВСТАВКИ (IFRAME):" },
        en: { title: "🐰 EASTER EGG HUNT: EDITOR 🐰", endLbl: "FINAL CONGRATULATIONS:", endPl: "Victory text...", qLbl: "Questions", qPl: "Each line is one question\n(To add image use [http://link.jpg] in text)", cLbl: "Correct Answers", cPl: "Each line — answer for the question on the left", wLbl: "Wrong Answers", wPl: "Optional: wrong answers separated by |\nExample: cat | cap | map", stealLbl: "Take wrong answers from other correct ones if line is empty", randLbl: "Randomize question order in game", pubBtn: "PUBLISH QUEST", copy: "COPY THIS CODE TO EMBED (IFRAME):" },
        fr: { title: "🐰 CHASSE AUX OEUFS : ÉDITEUR 🐰", endLbl: "FÉLICITATIONS FINALES :", endPl: "Texte de victoire...", qLbl: "Questions", qPl: "Chaque ligne est une question\n(Pour ajouter une image, utilisez [http://lien.jpg])", cLbl: "Bonnes Réponses", cPl: "Chaque ligne — réponse à la question de gauche", wLbl: "Mauvaises Réponses", wPl: "Optionnel : séparées par |\nExemple : chat | chapeau | carte", stealLbl: "Prendre les mauvaises réponses des autres si vide", randLbl: "Ordre aléatoire des questions", pubBtn: "PUBLIER LA QUÊTE", copy: "COPIEZ CE CODE POUR INTÉGRER (IFRAME) :" },
        de: { title: "🐰 OSTEREIERSUCHE: EDITOR 🐰", endLbl: "ABSCHLUSS-GLÜCKWUNSCH:", endPl: "Siegestext...", qLbl: "Fragen", qPl: "Jede Zeile ist eine Frage\n(Für Bilder nutze [http://link.jpg])", cLbl: "Richtige Antworten", cPl: "Jede Zeile — Antwort für die linke Frage", wLbl: "Falsche Antworten", wPl: "Optional: getrennt durch |\nBeispiel: Katze | Hut | Karte", stealLbl: "Falsche Antworten von anderen nehmen, wenn leer", randLbl: "Zufällige Fragenreihenfolge", pubBtn: "QUEST VERÖFFENTLICHEN", copy: "KOPIEREN SIE DIESEN CODE ZUM EINBETTEN:" },
        es: { title: "🐰 BÚSQUEDA DE HUEVOS: EDITOR 🐰", endLbl: "FELICITACIONES FINALES:", endPl: "Texto de victoria...", qLbl: "Preguntas", qPl: "Cada línea es una pregunta\n(Para imagen añade [http://enlace.jpg])", cLbl: "Respuestas Correctas", cPl: "Cada línea — respuesta a la pregunta izquierda", wLbl: "Respuestas Incorrectas", wPl: "Opcional: separadas por |\nEjemplo: gato | gorra | mapa", stealLbl: "Tomar respuestas incorrectas de otras si está vacío", randLbl: "Orden aleatorio de preguntas en el juego", pubBtn: "PUBLICAR MISIÓN", copy: "COPIA ESTE CÓDIGO PARA INSERTAR (IFRAME):" },
        it: { title: "🐰 CACCIA ALLE UOVA: EDITOR 🐰", endLbl: "CONGRATULAZIONI FINALI:", endPl: "Testo di vittoria...", qLbl: "Domande", qPl: "Ogni riga è una domanda\n(Per l'immagine aggiungi [http://link.jpg])", cLbl: "Risposte Corrette", cPl: "Ogni riga — risposta alla domanda a sinistra", wLbl: "Risposte Sbagliate", wPl: "Opzionale: separate da |\nEsempio: gatto | cappello | mappa", stealLbl: "Prendi risposte sbagliate da altre corrette se vuoto", randLbl: "Ordine casuale delle domande", pubBtn: "PUBBLICA MISSIONE", copy: "COPIA QUESTO CODICE DA INSERIRE (IFRAME):" },
        ja: { title: "🐰 エッグハント：エディター 🐰", endLbl: "クリアメッセージ:", endPl: "クリア時のテキスト...", qLbl: "質問", qPl: "各行に1つの質問\n（画像を追加するにはテキストに [http://リンク.jpg] を含めます）", cLbl: "正解", cPl: "各行 — 左側の質問の答え", wLbl: "不正解", wPl: "任意: | で区切る\n例: 猫 | 帽子 | 地図", stealLbl: "空の場合は他の正解から不正解を取得する", randLbl: "ゲーム内で質問をランダムに並べ替える", pubBtn: "クエストを公開", copy: "埋め込み用のコードをコピー (IFRAME):" },
        zh: { title: "🐰 寻找彩蛋：编辑器 🐰", endLbl: "最终祝贺:", endPl: "胜利文本...", qLbl: "问题", qPl: "每行一个问题\n（如需图片，请在文本中添加 [http://链接.jpg]）", cLbl: "正确答案", cPl: "每行 — 左侧问题的答案", wLbl: "错误答案", wPl: "可选：使用 | 分隔\n例如：猫 | 帽子 | 地图", stealLbl: "如果为空，则从其他正确答案中获取错误答案", randLbl: "在游戏中随机排列问题顺序", pubBtn: "发布任务", copy: "复制此代码以嵌入 (IFRAME):" }
    };

    let selectedLanguage = "ru";

    document.getElementById('lang-select').addEventListener('change', (e) => {
        selectedLanguage = e.target.value;
        const t = i18nEditor[selectedLanguage];
        document.getElementById('title-main').innerText = t.title;
        document.getElementById('lbl-end').innerText = t.endLbl;
        document.getElementById('endMsg').placeholder = t.endPl;
        document.getElementById('lbl-q').innerText = t.qLbl;
        document.getElementById('col-q').placeholder = t.qPl;
        document.getElementById('lbl-c').innerText = t.cLbl;
        document.getElementById('col-c').placeholder = t.cPl;
        document.getElementById('lbl-w').innerText = t.wLbl;
        document.getElementById('col-w').placeholder = t.wPl;
        document.getElementById('lbl-steal').innerText = t.stealLbl;
        document.getElementById('lbl-rand').innerText = t.randLbl;
        document.getElementById('pubBtn').innerText = t.pubBtn;
        document.getElementById('lbl-copy').innerText = t.copy;
    });

    async function publish() {
        const btn = document.getElementById('pubBtn');
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        
        const qs = document.getElementById('col-q').value.split('\n').map(s=>s.trim());
        const cs = document.getElementById('col-c').value.split('\n').map(s=>s.trim());
        const ws = document.getElementById('col-w').value.split('\n').map(s=>s.trim());
        
        const autoSteal = document.getElementById('opt-steal').checked;
        const randomize = document.getElementById('opt-rand').checked;

        let tasks = [];
        let allCorrects = cs.filter(c => c !== "");

        for(let i = 0; i < qs.length; i++) {
            if(!qs[i]) continue;
            
            let qText = qs[i];
            let cText = cs[i] || "Correct Answer";
            
            let imgUrl = "";
            let imgMatch = qText.match(/\[(.*?)\]/);
            if(imgMatch) {
                imgUrl = imgMatch[1];
                qText = qText.replace(imgMatch[0], '').trim();
            }

            let wrongArr = [];
            if(ws[i]) {
                wrongArr = ws[i].split('|').map(s=>s.trim()).filter(Boolean);
            } else if (autoSteal) {
                let others = allCorrects.filter(c => c !== cText);
                others.sort(() => 0.5 - Math.random());
                wrongArr = others.slice(0, 3);
            }

            tasks.push({
                question: qText,
                img: imgUrl,
                correct: cText,
                wrong: wrongArr
            });
        }

        if(randomize) tasks.sort(() => 0.5 - Math.random());

        if(tasks.length === 0) {
            status.innerText = "ОШИБКА: Добавьте хотя бы одно задание!";
            status.style.color = "#ff0000";
            return;
        }

        btn.disabled = true;
        status.innerText = "СБОРКА ДАННЫХ...";
        status.style.color = "var(--sec)";

        const gameId = 'easter-' + Math.random().toString(36).substr(2, 9);
        const data = {
            endMessage: document.getElementById('endMsg').value,
            language: selectedLanguage, // Передаем выбранный язык в движок
            eggs: tasks
        };

        try {
            status.innerText = "СОХРАНЯЕМ КВЕСТ...";
            
            const res = await fetch('https://publisher-server-ihqm.onrender.com/publish', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Publish-Key': 'super-secret-123' 
                },
                body: JSON.stringify({ 
                    id: gameId, 
                    folder: 'data', 
                    data: data 
                })
            });

            if(!res.ok) throw new Error("Сервер не ответил (код: " + res.status + ")");

            status.innerText = "ГОТОВО! ИГРА СОЗДАЁТСЯ...";
            status.style.color = "#00ff00";

            const url = `https://kgbgamelab.github.io/eggs/index.html?id=${gameId}`;
            const iframe = `<iframe src="${url}" width="100%" height="100%" style="border:none; position:fixed; top:0; left:0;" allow="autoplay"></iframe>`;
            
            output.style.display = 'block';
            document.getElementById('finalCode').value = iframe;

        } catch(e) {
            status.innerText = "ОШИБКА: " + e.message;
            status.style.color = "#ff0000";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
