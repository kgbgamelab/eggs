<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Easter Egg Hunt</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Montserrat:wght@800&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; background: #87CEFA; font-family: 'VT323', monospace; user-select: none; }
    #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    
    /* Модалка Квиза */
    #quiz-ui {
      display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95); border: 8px solid #ffaa00; padding: 40px;
      text-align: center; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); 
      pointer-events: auto; z-index: 1000; width: 500px; font-family: 'Montserrat', sans-serif;
    }
    #quiz-img { max-width: 100%; max-height: 200px; border-radius: 10px; display: none; margin-bottom: 15px; }
    #quiz-q { font-size: 24px; color: #333; margin-bottom: 20px; font-weight: bold; }
    .ans-btn {
      display: block; width: 100%; padding: 15px; margin-bottom: 10px; font-size: 18px; font-family: inherit;
      background: #87CEFA; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;
    }
    .ans-btn:hover { background: #00ffcc; transform: scale(1.02); }
    
    #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); mix-blend-mode: difference; }
    #crosshair::before { content: ''; position: absolute; top: 11px; left: 0; width: 24px; height: 2px; background: white; }
    #crosshair::after { content: ''; position: absolute; top: 0; left: 11px; width: 2px; height: 24px; background: white; }

    #egg-counter { position: absolute; top: 20px; right: 20px; font-size: 40px; color: #fff; text-shadow: 3px 3px 0 #ffaa00; }
    #house-status { position: absolute; top: 100px; width: 100%; text-align: center; font-size: 30px; color: #55ff55; text-shadow: 2px 2px 0 #000; display: none; }
    #game-over { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 999; background: rgba(50,0,0,0.9); }
    
    /* Экран победы */
    #win-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: rgba(135, 206, 250, 0.9); z-index: 1001; pointer-events: auto; }
    #win-screen h1 { font-size: 80px; color: #fff; text-shadow: 4px 4px 0 #ffaa00; margin: 0; }
    #win-msg { font-family: 'Montserrat'; font-size: 30px; color: #333; margin-top: 20px; background: #fff; padding: 20px 40px; border-radius: 20px; }
  </style>
</head>
<body>

<div id="hud">
  <div id="egg-counter">🥚 0 / 0</div>
  <div id="house-status">🛡️ В УКРЫТИИ</div>
  <div id="crosshair"></div>
</div>

<div id="quiz-ui">
  <img id="quiz-img" src="" alt="quest">
  <div id="quiz-q">Вопрос?</div>
  <div id="quiz-answers"></div>
</div>

<div id="win-screen">
  <h1>🏆 АЧИВКА: ВСЕ ЯЙЦА НАЙДЕНЫ!</h1>
  <div id="win-msg">Поздравление!</div>
  <button style="margin-top: 30px; padding: 15px 30px; font-size: 24px; cursor: pointer;" onclick="location.reload()">ИГРАТЬ СНОВА</button>
</div>

<div id="game-over">
  <h1 style="font-size: 100px; margin:0; text-shadow: 5px 5px 0 #000; color: #ff5555;">YOU DIED</h1>
  <p style="font-size: 40px; cursor: pointer; color: #ffff55; text-decoration: underline; margin-top: 20px;" onclick="location.reload()">Respawn</p>
</div>

<script>
let scene, camera, renderer, weaponGroup, flash;
let health = 5, eggsFound = 0, totalEggs = 0;
let targets = [], particles = [], eggs = [], houses = [];
let move = { fwd: false, bwd: false, left: false, right: false, sprint: false, jump: false };
let player = { vel: new THREE.Vector3(), onGround: false, height: 1.7, speed: 0 };
let pitch = 0, yaw = 0;
let isDead = false, isQuizActive = false;
let currentEgg = null;
let levelData = { endMessage: "Молодец!", eggs: [] };

const clock = new THREE.Clock();
const textures = {
  grass: createSolidTexture('#7CFC00', '#32CD32'), // Яркая весенняя трава
  wood: createSolidTexture('#8B4513', '#5C4033'),
  planks: createSolidTexture('#DEB887', '#D2B48C'),
  leaves: createSolidTexture('#FFB7C5', '#FF69B4') // Розовая сакура
};

function createSolidTexture(color1, color2) {
  const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64; const ctx = canvas.getContext('2d');
  ctx.fillStyle = color1; ctx.fillRect(0,0,64,64);
  ctx.fillStyle = color2; for(let i=0;i<100;i++) ctx.fillRect(Math.random()*60,Math.random()*60,4,4);
  return new THREE.CanvasTexture(canvas);
}

// Загрузка данных (Симуляция, если нет ID, используем демо-данные)
async function loadLevel() {
  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  if(id) {
    try {
      const res = await fetch(`https://kgbgamelab.github.io/texts/data/${id}.json`);
      const j = await res.json();
      levelData = j.data || j;
    } catch(e) { console.warn("Load failed", e); }
  } else {
    // Демо-данные если запущен без редактора
    levelData.eggs = [
      { question: "Сколько будет 2+2?", correct: "4", wrong: ["5", "3"], img: "" },
      { question: "Какого цвета небо?", correct: "Голубое", wrong: ["Зеленое", "Красное"], img: "" }
    ];
  }
  totalEggs = levelData.eggs.length;
  updateEggUI();
}

function init() {
  scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEFA); scene.fog = new THREE.Fog(0x87CEFA, 20, 100);
  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000); camera.rotation.order = 'YXZ';
  weaponGroup = new THREE.Group(); scene.add(weaponGroup);

  renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const ambient = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(50, 100, 50); scene.add(sun);

  createWorld();
  spawnEggs(levelData.eggs);

  // Оружие
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshLambertMaterial({color: 0x333}));
  flash = new THREE.PointLight(0xffaa00, 0, 4); flash.position.z = -1; weaponGroup.add(body, flash);
  weaponGroup.userData = { offset: new THREE.Vector3(0.4, -0.4, -0.6) };

  document.addEventListener('keydown', e => handleKeys(e.code, true));
  document.addEventListener('keyup', e => handleKeys(e.code, false));
  document.addEventListener('mousedown', onClick);
  document.addEventListener('mousemove', onMouseMove);
  
  animate();
}

function createWorld() {
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshLambertMaterial({map: textures.grass}));
  floor.rotation.x = -Math.PI/2; floor.material.map.wrapS = floor.material.map.wrapT = THREE.RepeatWrapping; floor.material.map.repeat.set(50, 50);
  scene.add(floor);

  // Цветы (мелкие разбросанные кубики)
  const colors = [0xff0000, 0xffff00, 0xff00ff, 0xffffff];
  for(let i=0; i<200; i++) {
    const f = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({color: colors[Math.floor(Math.random()*colors.length)]}));
    f.position.set(Math.random()*200-100, 0.15, Math.random()*200-100);
    scene.add(f);
  }

  createHouse(20, 0, 20); createHouse(-30, 0, -30);
  
  for(let i=0; i<40; i++) createTree(Math.random()*200-100, Math.random()*200-100);
  for(let i=0; i<15; i++) {
    const m = createMob(); m.position.set(Math.random()*100-50, 0, Math.random()*100-50);
    scene.add(m); targets.push({obj: m});
  }
}

function createHouse(x, z) {
  const grp = new THREE.Group();
  const wallMat = new THREE.MeshLambertMaterial({map: textures.wood});
  const w1 = new THREE.Mesh(new THREE.BoxGeometry(7, 4, 0.5), wallMat); w1.position.set(0,2,-3.5); grp.add(w1);
  const w2 = new THREE.Mesh(new THREE.BoxGeometry(7, 4, 0.5), wallMat); w2.position.set(0,2,3.5); grp.add(w2);
  const w3 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 7), wallMat); w3.position.set(-3.5,2,0); grp.add(w3);
  grp.position.set(x, 0, z); scene.add(grp);
  houses.push({ bounds: { minX: x - 3.8, maxX: x + 3.8, minZ: z - 3.8, maxZ: z + 3.8 } });
}

function createTree(x, z) {
  const group = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 1), new THREE.MeshLambertMaterial({map: textures.wood})); trunk.position.y = 2.5;
  const leaves = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshLambertMaterial({map: textures.leaves})); leaves.position.y = 6;
  group.add(trunk, leaves); group.position.set(x, 0, z); scene.add(group);
}

function spawnEggs(tasks) {
  const eggGeo = new THREE.SphereGeometry(0.5, 16, 16); eggGeo.scale(1, 1.3, 1);
  tasks.forEach((task, i) => {
    const color = new THREE.Color().setHSL(Math.random(), 1, 0.6);
    const eggMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, emissive: color, emissiveIntensity: 0.4 });
    const egg = new THREE.Mesh(eggGeo, eggMat);
    egg.position.set(Math.random()*100-50, 0.65, Math.random()*100-50);
    egg.userData = { isEgg: true, task: task };
    scene.add(egg); eggs.push(egg);

    const light = new THREE.PointLight(color, 1, 3); light.position.y = 1; egg.add(light);
  });
}

function createMob() {
  const mob = new THREE.Group();
  const matSkin = new THREE.MeshLambertMaterial({color: 0x5D995D});
  const matClothes = new THREE.MeshLambertMaterial({color: 0x3C50C4});
  
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.75, 0.25), matClothes); body.position.y = 1.125; body.userData.isBody = true;
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matSkin); head.position.y = 1.75; head.userData.isHead = true; // ✅ Хэдшот зона
  
  const armL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.75, 0.2), matSkin); armL.position.set(-0.35, 1.125, 0); armL.userData.isBody = true;
  const armR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.75, 0.2), matSkin); armR.position.set(0.35, 1.125, 0); armR.userData.isBody = true;
  
  mob.add(body, head, armL, armR);
  mob.userData = { parts: {armL, armR}, isAggro: false, hp: 3 }; // ✅ 3 ХП у моба
  return mob;
}

function onClick() {
  if(isDead || isQuizActive) return;
  
  // Анимация выстрела
  if(flash) { flash.intensity = 2; setTimeout(()=>flash.intensity=0, 50); }
  
  const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
  const hits = ray.intersectObjects(scene.children, true);
  
  if(hits.length > 0) {
    let hitMesh = hits[0].object;
    
    // Проверка на клик по Яйцу
    if(hitMesh.userData.isEgg) {
      openQuiz(hitMesh);
      return;
    }

    // Проверка на попадание по мобу
    let root = hitMesh; 
    while(root.parent && root.parent.type !== 'Scene' && !targets.find(t => t.obj === root)) root = root.parent;
    const target = targets.find(t => t.obj === root);
    
    if(target) {
      target.obj.userData.isAggro = true;
      
      // ✅ ЛОГИКА УРОНА: Голова = 3, Тело = 1
      let damage = hitMesh.userData.isHead ? 3 : 1;
      target.obj.userData.hp -= damage;
      
      if(target.obj.userData.hp <= 0) {
         pixelExplosion(target.obj.position, hitMesh.material.color);
         scene.remove(target.obj);
         targets = targets.filter(t => t !== target);
      } else {
         hitMesh.material.color.setHex(0xff0000);
         setTimeout(() => hitMesh.material.color.setHex(hitMesh.userData.isHead ? 0x5D995D : 0x3C50C4), 200);
      }
    }
  }
}

function pixelExplosion(pos, color) {
  for(let i=0; i<30; i++) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.15), new THREE.MeshBasicMaterial({color: color}));
    p.position.copy(pos); p.position.y += Math.random();
    scene.add(p);
    particles.push({m:p, v: new THREE.Vector3((Math.random()-.5)*0.3, Math.random()*0.2, (Math.random()-.5)*0.3)});
  }
}

function openQuiz(eggMesh) {
  isQuizActive = true;
  currentEgg = eggMesh;
  document.exitPointerLock();
  
  const task = eggMesh.userData.task;
  const ui = document.getElementById('quiz-ui');
  const img = document.getElementById('quiz-img');
  
  if(task.img) { img.src = task.img; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('quiz-q').innerText = task.question;
  
  const answersBox = document.getElementById('quiz-answers');
  answersBox.innerHTML = '';
  
  let allAns = [...task.wrong, task.correct].sort(() => Math.random() - 0.5);
  allAns.forEach(ans => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn'; btn.innerText = ans;
    btn.onclick = () => checkAnswer(ans, task.correct);
    answersBox.appendChild(btn);
  });
  
  ui.style.display = 'block';
}

function checkAnswer(selected, correct) {
  if(selected === correct) {
    eggsFound++;
    updateEggUI();
    scene.remove(currentEgg);
    eggs = eggs.filter(e => e !== currentEgg);
    pixelExplosion(currentEgg.position, 0xffff00);
    
    if(eggsFound >= totalEggs) showWinScreen();
  }
  // Закрываем UI в любом случае
  document.getElementById('quiz-ui').style.display = 'none';
  isQuizActive = false;
  document.body.requestPointerLock();
}

function updateEggUI() { document.getElementById('egg-counter').innerText = `🥚 ${eggsFound} / ${totalEggs}`; }

function showWinScreen() {
  document.exitPointerLock();
  document.getElementById('win-msg').innerText = levelData.endMessage || "Ты нашел все яйца!";
  document.getElementById('win-screen').style.display = 'flex';
}

function handleKeys(code, state) { if(code==='KeyW') move.fwd=state; if(code==='KeyS') move.bwd=state; if(code==='KeyA') move.left=state; if(code==='KeyD') move.right=state; if(code==='ShiftLeft') move.sprint=state; if(code==='Space') move.jump=state; }
function onMouseMove(e) { if(document.pointerLockElement && !isDead && !isQuizActive) { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); camera.rotation.set(pitch, yaw, 0); } }

function updatePhysics(delta) {
  if(isQuizActive) return;
  player.speed = move.sprint ? 15 : 8;
  const dir = new THREE.Vector3();
  const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); fwd.y=0; fwd.normalize();
  const rgt = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); rgt.y=0; rgt.normalize();
  if(move.fwd) dir.add(fwd); if(move.bwd) dir.sub(fwd);
  if(move.left) dir.sub(rgt); if(move.right) dir.add(rgt);
  if(dir.length()>0) dir.normalize().multiplyScalar(player.speed * delta);
  
  if(player.onGround && move.jump) { player.vel.y = 12; player.onGround = false; }
  player.vel.y -= 30 * delta;

  camera.position.x += (dir.x + player.vel.x * delta);
  camera.position.z += (dir.z + player.vel.z * delta);
  camera.position.y += player.vel.y * delta;
  if(camera.position.y < 1.7) { camera.position.y = 1.7; player.vel.y = 0; player.onGround = true; }
  player.vel.x *= 0.9; player.vel.z *= 0.9;
}

function animate() {
  requestAnimationFrame(animate); if(isDead) return;
  const delta = clock.getDelta();
  updatePhysics(delta);

  // Качание оружия
  const bob = (move.fwd||move.bwd) && !isQuizActive ? Math.sin(Date.now()*0.015)*0.03 : 0;
  weaponGroup.position.copy(camera.position); weaponGroup.quaternion.copy(camera.quaternion);
  weaponGroup.translateX(0.4); weaponGroup.translateY(-0.4 + bob); weaponGroup.translateZ(-0.6);

  // Мобы и ИИ
  targets.forEach(t => {
    const mob = t.obj;
    const dist = mob.position.distanceTo(camera.position);
    if(dist < 15) mob.userData.isAggro = true; // Агрятся, если близко

    if(mob.userData.isAggro && !isQuizActive) {
      mob.lookAt(camera.position.x, 0, camera.position.z);
      if(dist > 2.0) mob.translateZ(4 * delta);
      else if(Math.random() < 0.05) { health--; if(health <= 0) document.getElementById('game-over').style.display='flex'; }
      
      mob.userData.parts.armL.rotation.x = Math.sin(Date.now()*0.01);
      mob.userData.parts.armR.rotation.x = -Math.sin(Date.now()*0.01);
    }
  });

  // Анимация яиц
  eggs.forEach(e => { e.rotation.y += 0.02; e.position.y = 0.65 + Math.sin(Date.now()*0.003 + e.userData.task.question.length)*0.2; });

  // Пиксели взрыва
  for(let i=particles.length-1; i>=0; i--) {
    const p = particles[i]; p.m.position.add(p.v); p.v.y -= 0.01;
    if(p.m.position.y < 0) { scene.remove(p.m); particles.splice(i,1); }
  }

  renderer.render(scene, camera);
}

document.body.addEventListener('click', () => { if(!isDead && !isQuizActive) document.body.requestPointerLock(); });

loadLevel().then(init);
</script>
</body>
</html>
