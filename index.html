const DATA_BASE_URL = "https://kgbgamelab.github.io/texts/data/";

function getLevelIdFromUrl() { return new URLSearchParams(location.search).get("id") || ""; }

async function loadLevelData() {
  const id = getLevelIdFromUrl();
  if (!id) {
    levelData.eggs = [
      { question: "Пример вопроса?", correct: "Да", wrong: ["Нет"], img: "" }
    ];
    setGameLanguage("ru"); return;
  }
  try {
    const res = await fetch(`${DATA_BASE_URL}${encodeURIComponent(id)}.json?v=${Date.now()}`);
    if (!res.ok) throw new Error();
    const j = await res.json(); levelData = j.data || j;
    if(levelData.language) setGameLanguage(levelData.language);
  } catch (e) { console.warn(e); }
}

const clock = new THREE.Clock();
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const heartCanvas = document.createElement('canvas'); heartCanvas.width = 64; heartCanvas.height = 64;
const hCtx = heartCanvas.getContext('2d');
hCtx.font = '50px serif'; hCtx.textAlign = 'center'; hCtx.textBaseline = 'middle'; hCtx.fillText('❤️', 32, 32);
const heartTexture = new THREE.CanvasTexture(heartCanvas);

const FOOTSTEP_URL = 'https://raw.githack.com/kgbgamelab/minecraft/main/footsteps.wav';
let footstepBuffer = null;
new THREE.AudioLoader().load(FOOTSTEP_URL, (b) => { footstepBuffer = b; });

function playSound(type) {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime; const g = audioCtx.createGain(); g.connect(audioCtx.destination);
  if(type === 'step' && footstepBuffer) {
    const src = audioCtx.createBufferSource(); src.buffer = footstepBuffer; src.playbackRate.value = 0.95 + Math.random() * 0.1; 
    g.gain.value = 1.0; src.connect(g); src.start(0); src.stop(t + 0.25);
  } else if (type === 'music') {
    const notes = [523.25, 659.25, 783.99, 1046.50, 1174.66, 1046.50, 987.77, 1046.50, 1318.51, 1567.98];
    const durations = [0.15, 0.15, 0.15, 0.3, 0.1, 0.1, 0.1, 0.3, 0.2, 0.8]; let now = t;
    for(let i=0; i<notes.length; i++) {
      const osc = audioCtx.createOscillator(); const noteG = audioCtx.createGain(); osc.connect(noteG); noteG.connect(audioCtx.destination);
      osc.type = 'triangle'; osc.frequency.value = notes[i];
      noteG.gain.setValueAtTime(0.15, now); noteG.gain.exponentialRampToValueAtTime(0.001, now + durations[i]);
      osc.start(now); osc.stop(now + durations[i]); now += durations[i];
    }
  } else {
    const osc = audioCtx.createOscillator(); osc.connect(g);
    if(type === 'shoot') { osc.type='sawtooth'; osc.frequency.setValueAtTime(1200, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.15); g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.15); osc.start(); osc.stop(t + 0.15); } 
    else if(type === 'sword_hit') { osc.type='square'; osc.frequency.setValueAtTime(100, t); g.gain.setValueAtTime(0.5, t); g.gain.linearRampToValueAtTime(0, t + 0.1); osc.start(); osc.stop(t + 0.1); } 
    else if(type === 'hit') { osc.type='sawtooth'; osc.frequency.setValueAtTime(100, t); g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.2); osc.start(); osc.stop(t+0.2); } 
    else if(type === 'loot') { osc.type='sine'; osc.frequency.setValueAtTime(1200, t); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.5); osc.start(); osc.stop(t+0.5); } 
    else if(type === 'pop') { osc.type='sawtooth'; osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(10, t+0.1); g.gain.linearRampToValueAtTime(0, t+0.1); osc.start(); osc.stop(t+0.1); } 
    else if(type === 'heal') { osc.type='sine'; osc.frequency.setValueAtTime(400, t); osc.frequency.linearRampToValueAtTime(800, t+0.3); g.gain.setValueAtTime(0.3, t); g.gain.linearRampToValueAtTime(0, t+0.3); osc.start(); osc.stop(t+0.3); } 
    else if(type === 'wrong') { osc.type='sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(100, t+0.4); g.gain.setValueAtTime(0.3, t); g.gain.linearRampToValueAtTime(0, t+0.4); osc.start(); osc.stop(t+0.4); } 
    else if(type === 'break') { osc.type='sawtooth'; osc.frequency.setValueAtTime(50, t); g.gain.setValueAtTime(0.8, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.4); osc.start(); osc.stop(t+0.4); }
  }
}

function createTexture(type) {
  const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64; const ctx = canvas.getContext('2d');
  const fillNoise = (c) => { ctx.fillStyle = c; ctx.fillRect(0,0,64,64); for(let i=0; i<400; i++) { ctx.fillStyle=`rgba(0,0,0,0.1)`; ctx.fillRect(Math.random()*64,Math.random()*64,4,4); }};

  if(type === 'grass_top') { fillNoise('#7CFC00'); ctx.fillStyle='#32CD32'; for(let i=0;i<50;i++) ctx.fillRect(Math.random()*60,Math.random()*60,4,4); } 
  else if (type === 'wood') { ctx.fillStyle='#5c4033'; ctx.fillRect(0,0,64,64); ctx.fillStyle='#4a332a'; for(let i=1;i<4;i++) ctx.fillRect(i*16,0,4,64); }
  else if (type === 'planks') { ctx.fillStyle='#a07040'; ctx.fillRect(0,0,64,64); ctx.fillStyle='#805020'; ctx.fillRect(0,0,64,2); ctx.fillRect(0,20,64,2); ctx.fillRect(0,40,64,2); }
  else if (type === 'face') { fillNoise('#bcaea5'); ctx.fillStyle='#222'; ctx.fillRect(10,20,12,12); ctx.fillRect(42,20,12,12); ctx.fillStyle='#633'; ctx.fillRect(20,45,24,8); }
  else if (type === 'leaves') { fillNoise('#FFB7C5'); ctx.fillStyle='#FF69B4'; for(let i=0;i<60;i++) ctx.fillRect(Math.random()*60,Math.random()*60,6,6); } 
  else if (type === 'chest') { ctx.fillStyle='#6d4e34'; ctx.fillRect(0,0,64,64); ctx.fillStyle='#000'; ctx.strokeRect(2,2,60,60); ctx.fillStyle='#FFD700'; ctx.fillRect(28,24,8,12); }
  else if (type === 'skel_body') { ctx.fillStyle='#333'; ctx.fillRect(0,0,64,64); ctx.fillStyle='#ddd'; ctx.fillRect(28, 0, 8, 64); for(let i=10; i<50; i+=10) ctx.fillRect(10, i, 44, 4); }
  else if (type === 'skel_face') { ctx.fillStyle='#ccc'; ctx.fillRect(0,0,64,64); ctx.fillStyle='#111'; ctx.fillRect(10,20,16,14); ctx.fillRect(38,20,16,14); ctx.fillRect(28,40,8,8); ctx.fillStyle='#555'; ctx.fillRect(10,55,44,4); }

  const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
}
const textures = { grass: createTexture('grass_top'), wood: createTexture('wood'), planks: createTexture('planks'), face: createTexture('face'), leaves: createTexture('leaves'), chest: createTexture('chest'), skel_body: createTexture('skel_body'), skel_face: createTexture('skel_face') };

function generateEggTexture(baseColor) {
  const c = document.createElement('canvas'); c.width=64; c.height=64; const ctx = c.getContext('2d');
  ctx.fillStyle = baseColor.getStyle(); ctx.fillRect(0,0,64,64);
  ctx.fillStyle = 'rgba(255,255,255,0.8)'; for(let i=0; i<8; i++) { ctx.beginPath(); ctx.arc(Math.random()*64, Math.random()*64, 3+Math.random()*4, 0, Math.PI*2); ctx.fill(); }
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, 15, 64, 5); ctx.fillRect(0, 45, 64, 5);
  const tex = new THREE.CanvasTexture(c); tex.magFilter = THREE.NearestFilter; return tex;
}

function startGame() {
  difficulty = document.getElementById('diff-select').value;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  
  if(audioCtx.state === 'suspended') audioCtx.resume();
  document.body.requestPointerLock();
  
  init(); updateUI(); gameStarted = true;
}

function init() {
  scene = new THREE.Scene(); scene.background = new THREE.Color(0x00BFFF); scene.fog = new THREE.Fog(0x00BFFF, 20, 100);
  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000); camera.rotation.order = 'YXZ';
  weaponGroup = new THREE.Group(); scene.add(weaponGroup);

  renderer = new THREE.WebGLRenderer({ antialias: false }); renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0); sun.position.set(50, 100, 50); sun.castShadow = true; scene.add(sun);

  createWorld(); setWeapon('gun'); spawnLoot(); spawnEggs();

  document.addEventListener('keydown', e => {
    if(!gameStarted || isDead || isQuizActive) return;
    if(e.key === '1') setWeapon('gun'); 
    if(e.key === '2') setWeapon('sword'); 
    if(e.key === '3') setWeapon('wood'); 
    if(e.key === '4') setWeapon('axe'); // ✅ Топор
    if(e.code === 'Space') move.jump = true; 
    if(e.code === 'ShiftLeft') move.sprint = true;
    handleKeys(e.code, true);
  });
  document.addEventListener('keyup', e => {
    if(e.code === 'Space') move.jump = false; if(e.code === 'ShiftLeft') move.sprint = false;
    handleKeys(e.code, false);
  });
  
  // ✅ ОБРАБОТКА КЛИКОВ (Левая - бить, Правая - строить дом)
  document.addEventListener('mousedown', (e) => {
    if(!gameStarted || isDead || isQuizActive) return;
    if (e.button === 2) { buildBlock(e); } 
    else if (e.button === 0) { attack(e); } 
  });
  document.addEventListener('contextmenu', e => { e.preventDefault(); buildBlock(e); });
  
  document.addEventListener('mousemove', onMouseMove);
  window.addEventListener('resize', () => { camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
  animate();
}

function createWorld() {
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshLambertMaterial({map: textures.grass}));
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; floor.material.map.wrapS = floor.material.map.wrapT = THREE.RepeatWrapping; floor.material.map.repeat.set(100, 100); scene.add(floor);

  for(let i=0; i<150; i++) {
    const f = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({color: [0xff0000, 0xffff00, 0xff00ff, 0xffffff][Math.floor(Math.random()*4)]}));
    f.position.set(Math.random()*200-100, 0.15, Math.random()*200-100); scene.add(f);
  }

  createHouse(20, 0, 20); createHouse(-30, 0, -30); createHouse(40, 0, -10);

  for(let i=0; i<40; i++) {
    const x = Math.random()*200-100; const z = Math.random()*200-100;
    let tooClose = false; houses.forEach(h => { if(new THREE.Vector3(x,0,z).distanceTo(new THREE.Vector3(h.bounds.minX, 0, h.bounds.minZ)) < 8) tooClose = true; });
    if(!tooClose && (Math.abs(x)>10 || Math.abs(z)>10)) createTree(x, z);
  }

  let mobCount = difficulty === 'hard' ? 15 : (difficulty === 'normal' ? 7 : 0);
  for(let i=0; i<mobCount; i++) {
    const type = Math.random()>0.5?'zombie':'skeleton';
    const m = createMob(type, type); m.position.set(Math.random()*100-50, 0, Math.random()*100-50);
    m.userData.home = m.position.clone(); scene.add(m); targets.push({obj: m});
  }
  
  createRabbit(); // ✅ Кролик из примитивов
}

function createTree(x, z) {
  const group = new THREE.Group(); group.userData = { isTree: true, hp: 3 };
  const trunk = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 1), new THREE.MeshLambertMaterial({map: textures.wood})); trunk.position.y = 2.5; trunk.castShadow = true;
  const leafGeo = new THREE.BoxGeometry(1, 1, 1); const leafMat = new THREE.MeshLambertMaterial({map: textures.leaves, color: 0xFFB7C5});
  for(let lx=-2; lx<=2; lx++) for(let ly=0; ly<=2; ly++) for(let lz=-2; lz<=2; lz++)
    if(Math.abs(lx)+Math.abs(ly)+Math.abs(lz) < 4) { const l = new THREE.Mesh(leafGeo, leafMat); l.position.set(lx, 4+ly, lz); group.add(l); }
  group.add(trunk); group.position.set(x, 0, z); scene.add(group);
}

function setWeapon(type) {
  currentWeaponType = type; weaponGroup.clear(); 
  document.querySelectorAll('.slot').forEach((s, i) => {
      s.classList.remove('active');
      if(type === 'gun' && i === 0) s.classList.add('active');
      if(type === 'sword' && i === 1) s.classList.add('active');
      if(type === 'wood' && i === 2) s.classList.add('active');
      if(type === 'axe' && i === 3) s.classList.add('active');
  });

  if(type==='gun') {
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshLambertMaterial({color: 0x333}));
      flash = new THREE.PointLight(0xffaa00, 0, 4); flash.position.z = -1; weaponGroup.add(body, flash);
      weaponGroup.userData = { offset: new THREE.Vector3(0.4, -0.4, -0.6) };
  } else if (type === 'sword') {
      const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.05), new THREE.MeshLambertMaterial({color: 0x88ccff})); blade.position.y = 0.5;
      const handle = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.3, 0.08), new THREE.MeshLambertMaterial({color: 0x5c4033})); handle.position.y = -0.1;
      weaponGroup.add(blade, handle); weaponGroup.userData = { offset: new THREE.Vector3(0.5, -0.5, -0.8) };
  } else if (type === 'wood') {
      const woodBlock = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshLambertMaterial({map: textures.planks}));
      weaponGroup.add(woodBlock); weaponGroup.userData = { offset: new THREE.Vector3(0.5, -0.5, -0.8) };
  } else if (type === 'axe') {
      const handle = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.6, 0.05), new THREE.MeshLambertMaterial({color: 0x5c4033})); handle.position.y = 0.2;
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.3), new THREE.MeshLambertMaterial({color: 0x777777})); head.position.set(0, 0.4, 0.1);
      weaponGroup.add(handle, head); weaponGroup.userData = { offset: new THREE.Vector3(0.5, -0.5, -0.8) };
  }
}

function createMob() {
  const mob = new THREE.Group();
  const isSkel = Math.random() > 0.5;
  const skinColor = isSkel ? 0xdddddd : 0x5D995D; const texFace = isSkel ? textures.skel_face : textures.face;
  const matSkin = new THREE.MeshLambertMaterial({color: skinColor});
  const matClothes = new THREE.MeshLambertMaterial({color: isSkel ? 0xcccccc : 0x3C50C4});
  const headMats = [matSkin, matSkin, matSkin, matSkin, new THREE.MeshLambertMaterial({map: texFace}), matSkin];
  
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.75, 0.25), isSkel ? new THREE.MeshLambertMaterial({map: textures.skel_body}) : matClothes); body.position.y = 1.125;
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), headMats); head.position.y = 1.75; head.userData.isHead = true; // ✅ ХЭДШОТ

  const w = isSkel ? 0.1 : 0.2;
  const armGeo = new THREE.BoxGeometry(w, 0.75, w); armGeo.translate(0, -0.3, 0);
  const armL = new THREE.Mesh(armGeo, matSkin); armL.position.set(-0.35, 1.5, 0);
  const armR = new THREE.Mesh(armGeo, matSkin); armR.position.set(0.35, 1.5, 0);
  const legGeo = new THREE.BoxGeometry(w, 0.75, w); legGeo.translate(0, -0.375, 0);
  const legL = new THREE.Mesh(legGeo, matSkin); legL.position.set(-0.15, 0.75, 0);
  const legR = new THREE.Mesh(legGeo, matSkin); legR.position.set(0.15, 0.75, 0);

  mob.add(body, head, armL, armR, legL, legR);
  mob.userData = { parts: {armL, armR, legL, legR, body, head}, isAggro: false, aggroTimer: 0, type: isSkel ? 'skeleton' : 'zombie', hp: 3, walkTimer: Math.random() * 2, walkDir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(), home: null };
  return mob;
}

function unlockAch(id) {
  if(!myAchievements.has(id)) {
    myAchievements.add(id);
    spawnFloatingText(camera.position.x, camera.position.y + 1, camera.position.z, "🏆 ACHIEVEMENT!", "gold");
    playSound('heal');
  }
}

function spawnFloatingText(x, y, z, text, color) {
  const div = document.createElement('div'); div.className = 'float-text'; div.innerText = text; div.style.color = color;
  if(text === 'CRIT!') div.classList.add('crit');
  document.body.appendChild(div);
  const vec = new THREE.Vector3(x, y + 2, z); vec.project(camera);
  const cx = (vec.x * .5 + .5) * window.innerWidth; const cy = (-(vec.y * .5) + .5) * window.innerHeight;
  div.style.left = cx + 'px'; div.style.top = cy + 'px'; setTimeout(() => div.remove(), 1500);
}

function healPlayer() {
  if(health < 5) {
    health++; const hearts = document.querySelectorAll('.heart');
    for(let i=0; i<hearts.length; i++) { if(hearts[i].classList.contains('lost')) { hearts[i].classList.remove('lost'); break; } }
    playSound('heal');
  }
}

// ✅ ПОСТРОЙКА ПОЛНОЦЕННОГО ДОМА (СМЕЩЕНО ВПЕРЕД, ЧТОБЫ НЕ ЗАСТРЯТЬ)
function buildBlock(e) {
  if(e) e.preventDefault();
  if(!gameStarted || isDead || isQuizActive || woodCount < 10 || currentWeaponType !== 'wood') return; 
  
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  dir.y = 0; dir.normalize();
  
  // Ставим дом на 12 блоков вперед от камеры (чтобы игрок не застрял внутри)
  const spawnPos = camera.position.clone().add(dir.multiplyScalar(12));
  spawnPos.y = 0; // Земля
  
  createHouse(spawnPos.x, spawnPos.y, spawnPos.z);
  
  woodCount -= 10; builtBlocks++; updateUI(); playSound('step');
  if(builtBlocks >= 5) unlockAch('ach4'); // Строитель
}

function attack(e) {
  if(e && e.button === 2) return; 
  if(isDead || isSwinging || isQuizActive || currentWeaponType === 'wood') return; 
  
  isSwinging = true; swingProgress = 0;
  if(currentWeaponType === 'gun') { playSound('shoot'); if(flash) { flash.intensity = 2; setTimeout(()=>flash.intensity=0, 50); } } 
  else playSound('sword_hit');

  const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
  const hits = ray.intersectObjects(scene.children, true);

  if(hits.length > 0) {
    let hit = hits[0].object; 
    if(hit.userData.isEgg) { openQuiz(hit); return; }

    let root = hit; while(root.parent && root.parent.type !== 'Scene' && !targets.find(t => t.obj === root) && !root.userData.isTree && !root.userData.isRabbit) root = root.parent;

    if (root.userData.isTree) {
        if(currentWeaponType !== 'axe') { 
            spawnFloatingText(camera.position.x, camera.position.y, camera.position.z, "Нужен Топор (4)!", "#ff0000"); 
            return; 
        }
        playSound('break'); root.userData.hp--; pixelExplosion(hits[0].point, 0x5c4033);
        if (root.userData.hp <= 0) { 
            scene.remove(root); woodCount += 3; updateUI(); 
            spawnFloatingText(root.position.x, root.position.y+3, root.position.z, "+3 🪵", "#deb887"); 
            if(woodCount >= 30) unlockAch('ach2'); // Дровосек
        } return;
    }
    
    if (root.userData.isRabbit) { 
        playSound('music'); scene.remove(root); rabbitObj = null; unlockAch('ach5'); 
        document.exitPointerLock(); document.getElementById('rabbit-screen').style.display = 'flex'; return; 
    }
    
    if(bonuses.includes(root)) { 
      playSound('loot'); scene.remove(root); bonuses = bonuses.filter(b => b !== root); 
      if (Math.random() > 0.5) { healPlayer(); spawnFloatingText(root.position.x, root.position.y, root.position.z, "+1 ❤️", "#ff0000"); }
      else { score += 200; spawnFloatingText(root.position.x, root.position.y, root.position.z, "+200 XP", "#ffff00"); }
      updateUI(); spawnParticles(root.position, 0xffff00); return; 
    }
    if(items.includes(root)) { playSound('loot'); scene.remove(root); items = items.filter(i => i !== root); if(root.userData.type === 'sword_item') { inventory.push('sword'); document.getElementById('slot-1').innerText = "🗡️"; } return; }

    let mobGroup = hit; while(mobGroup.parent && mobGroup.type !== 'Scene' && !targets.find(t => t.obj === mobGroup)) { mobGroup = mobGroup.parent; }
    const target = targets.find(t => t.obj === mobGroup);
    
    if(target) {
      target.obj.userData.isAggro = true; target.obj.userData.aggroTimer = 10;
      let isHeadshot = hit.userData.isHead; let damage = isHeadshot ? 3 : 1; target.obj.userData.hp -= damage;
      if(isHeadshot) {
          headshots++; spawnFloatingText(target.obj.position.x, target.obj.position.y+1, target.obj.position.z, "HEADSHOT!", "#ff0000");
          if(headshots >= 5) unlockAch('ach3'); // Снайпер
      }

      if(target.obj.userData.hp <= 0) {
        playSound('pop'); pixelExplosion(target.obj.position, hit.material.color || 0x5D995D);
        scene.remove(target.obj); targets = targets.filter(t => t !== target); score += 100; updateUI();
      } else { hit.material.color.setHex(0xff0000); setTimeout(() => hit.material.color.setHex(isHeadshot ? 0xdddddd : 0x5D995D), 200); }
    }
  }
}

function pixelExplosion(pos, color) {
  for(let i=0; i<40; i++) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2), new THREE.MeshBasicMaterial({color: color}));
    p.position.copy(pos); p.position.y += Math.random(); scene.add(p);
    particles.push({m:p, v: new THREE.Vector3((Math.random()-.5)*0.5, Math.random()*0.3, (Math.random()-.5)*0.5)});
  }
}

// ✅ ИСПРАВЛЕННЫЙ ПАРСЕР КАРТИНОК ДЛЯ КВИЗА
function openQuiz(eggMesh) {
  isQuizActive = true; currentEggMesh = eggMesh; document.exitPointerLock();
  const task = eggMesh.userData.task;
  const ui = document.getElementById('quiz-ui'); const img = document.getElementById('quiz-img');
  
  let qText = task.question;
  let finalImgUrl = task.img || "";

  // Вырезаем любую ссылку из текста вопроса []
  let imgMatch = qText.match(/\[(.*?)\]/);
  if(imgMatch) {
      finalImgUrl = imgMatch[1];
      qText = qText.replace(imgMatch[0], '').trim();
  } else if (qText.startsWith("http")) { // Если весь вопрос это ссылка
      finalImgUrl = qText;
      qText = "Вопрос:";
  }
  
  if(finalImgUrl && finalImgUrl.trim() !== "") { 
      img.src = finalImgUrl.trim(); 
      img.style.display = 'inline-block'; 
  } else { 
      img.style.display = 'none'; 
  }
  
  document.getElementById('quiz-q').innerText = qText;

  const ansBox = document.getElementById('quiz-answers'); ansBox.innerHTML = '';
  let allAns = [...task.wrong, task.correct].sort(() => Math.random() - 0.5);
  
  allAns.forEach(ans => {
    const btn = document.createElement('button'); btn.className = 'ans-btn'; btn.innerText = ans;
    btn.onclick = (e) => checkAnswer(e.target, ans, task.correct);
    ansBox.appendChild(btn);
  });
  ui.style.display = 'block';
}

function checkAnswer(btnEl, selected, correct) {
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
  if(selected === correct) {
    playSound('heal'); btnEl.classList.add('correct'); eggsFound++; score += 500; updateUI();
    unlockAch('ach1'); // Ачивка Первое Яйцо
    pixelExplosion(currentEggMesh.position, currentEggMesh.userData.baseColor);
    scene.remove(currentEggMesh); eggs = eggs.filter(e => e !== currentEggMesh);
  } else { playSound('wrong'); btnEl.classList.add('wrong'); }

  setTimeout(() => {
    document.getElementById('quiz-ui').style.display = 'none'; isQuizActive = false;
    peaceTimer = 5.0; document.body.requestPointerLock();
    if(eggsFound >= levelData.eggs.length && levelData.eggs.length > 0) showWinScreen();
  }, 1500);
}

function showWinScreen() {
  document.exitPointerLock(); playSound('music');
  
  document.getElementById('win-msg').innerText = levelData.endMessage || (i18n[currentLang] ? i18n[currentLang].winT : "С Праздником!");
  document.getElementById('final-score').innerText = `${i18n[currentLang].score} ${score}`;
  
  const list = document.getElementById('achievements-list'); list.innerHTML = '';
  myAchievements.forEach(id => {
      const badge = document.createElement('div');
      badge.className = 'ach-badge';
      badge.innerText = i18n[currentLang][id];
      list.appendChild(badge);
  });

  document.getElementById('win-screen').style.display = 'flex';
}

function updateUI() {
  document.getElementById('lvl-num').innerText = score;
  document.getElementById('combo-num').innerText = combo;
  document.getElementById('xp-fill').style.width = Math.min(100, (score % 5000) / 50) + '%';
  document.getElementById('egg-counter').innerText = `🥚 ${eggsFound} / ${levelData.eggs.length}`;
  document.getElementById('wood-counter').innerText = `🪵 ${woodCount}`;
}

function checkHouseProtection(pos) {
  for(let h of houses) { if (h.hp > 0 && pos.x > h.bounds.minX + 0.5 && pos.x < h.bounds.maxX - 0.5 && pos.z > h.bounds.minZ + 0.5 && pos.z < h.bounds.maxZ - 0.5) return h; }
  return null;
}

function spawnParticles(pos, color, isHeart = false) {
  for(let i=0; i<10; i++) {
    let p; if(isHeart) { const heart = new THREE.Sprite(new THREE.SpriteMaterial({map: heartTexture, color: 0xffffff})); heart.scale.set(0.5, 0.5, 1); p = heart; } 
    else { p = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.15), new THREE.MeshBasicMaterial({color: color})); }
    p.position.copy(pos); scene.add(p); particles.push({m:p, v: new THREE.Vector3((Math.random()-.5)*0.5, Math.random()*0.5, (Math.random()-.5)*0.5)});
  }
}

function handleKeys(code, state) { if(code === 'KeyW') move.fwd = state; if(code === 'KeyS') move.bwd = state; if(code === 'KeyA') move.left = state; if(code === 'KeyD') move.right = state; }
function onMouseMove(e) { if(document.pointerLockElement && !isDead && !isQuizActive) { yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); camera.rotation.set(pitch, yaw, 0); } }

function updatePhysics(delta) {
  if(isQuizActive) return;
  player.speed = move.sprint ? 18 : 10;
  const direction = new THREE.Vector3();
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); forward.y = 0; forward.normalize();
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); right.y = 0; right.normalize();
  if(move.fwd) direction.add(forward); if(move.bwd) direction.sub(forward);
  if(move.left) direction.sub(right); if(move.right) direction.add(right);
  if(direction.length() > 0) direction.normalize().multiplyScalar(player.speed * delta);
  if(player.onGround && move.jump) { player.vel.y = 12; player.onGround = false; }
  player.vel.y -= 30 * delta;

  let nextX = camera.position.x + (direction.x + player.vel.x * delta); let nextZ = camera.position.z + (direction.z + player.vel.z * delta);
  let canMoveX = true, canMoveZ = true; const wallT = 0.8;
  for(let h of houses) {
    if(h.hp <= 0) continue;
    if (nextX > h.bounds.minX - wallT && nextX < h.bounds.minX + wallT && camera.position.z > h.bounds.minZ && camera.position.z < h.bounds.maxZ) canMoveX = false;
    if (nextX > h.bounds.maxX - wallT && nextX < h.bounds.maxX + wallT && camera.position.z > h.bounds.minZ && camera.position.z < h.bounds.maxZ) { if (camera.position.z < h.bounds.minZ+1 || camera.position.z > h.bounds.maxZ-1) canMoveX = false; }
    if (camera.position.x > h.bounds.minX && camera.position.x < h.bounds.maxX && nextZ > h.bounds.minZ - wallT && nextZ < h.bounds.minZ + wallT) canMoveZ = false;
    if (camera.position.x > h.bounds.minX && camera.position.x < h.bounds.maxX && nextZ > h.bounds.maxZ - wallT && nextZ < h.bounds.maxZ + wallT) canMoveZ = false;
  }
  nextX = Math.max(WORLD_MIN, Math.min(WORLD_MAX, nextX)); nextZ = Math.max(WORLD_MIN, Math.min(WORLD_MAX, nextZ));
  if(canMoveX) camera.position.x = nextX; if(canMoveZ) camera.position.z = nextZ;

  camera.position.y += player.vel.y * delta;
  if(camera.position.y < 1.7) { camera.position.y = 1.7; player.vel.y = 0; player.onGround = true; }
  player.vel.x *= 0.9; player.vel.z *= 0.9;

  const house = checkHouseProtection(camera.position); document.getElementById('house-status').style.display = house ? 'block' : 'none';
  const stepInterval = move.sprint ? 300 : 500;
  if(direction.length() > 0 && player.onGround && Date.now() - stepTimer > stepInterval) { playSound('step'); stepTimer = Date.now(); }
}

function animate() {
  requestAnimationFrame(animate); if(!gameStarted || isDead) return;
  const delta = clock.getDelta(); const now = Date.now() / 1000;
  
  if(peaceTimer > 0) { 
      peaceTimer -= delta; document.getElementById('peace-status').style.display = 'block'; 
      let tText = i18n[currentLang] ? i18n[currentLang].peace : "🕊️ ПЕРЕМИРИЕ";
      document.getElementById('peace-status').innerText = `${tText} (${Math.ceil(peaceTimer)}С)`; 
  } else { document.getElementById('peace-status').style.display = 'none'; }

  updatePhysics(delta);

  const offset = weaponGroup.userData.offset || new THREE.Vector3(0.5, -0.5, -0.8);
  const bob = (move.fwd || move.bwd) && !isQuizActive ? Math.sin(now*(move.sprint?18:12))*0.03 : 0;
  weaponGroup.position.copy(camera.position); weaponGroup.quaternion.copy(camera.quaternion);
  weaponGroup.translateX(offset.x); weaponGroup.translateY(offset.y + bob); weaponGroup.translateZ(offset.z);

  if(isSwinging) {
    swingProgress += delta * 15;
    if(swingProgress >= Math.PI) { swingProgress = 0; isSwinging = false; weaponGroup.rotation.x = 0; }
    else { if(currentWeaponType === 'gun') weaponGroup.position.z += Math.sin(swingProgress)*0.1; else weaponGroup.rotateX(-Math.sin(swingProgress)); }
  } else weaponGroup.rotateX(currentWeaponType !== 'gun' ? Math.PI/8 : 0);

  if(rabbitObj) {
      rabbitObj.userData.timer -= delta;
      if(rabbitObj.userData.timer <= 0) {
         rabbitObj.userData.timer = 0.5 + Math.random();
         rabbitObj.userData.vel.set((Math.random()-0.5)*25, 10, (Math.random()-0.5)*25);
         const targetPos = rabbitObj.position.clone().add(rabbitObj.userData.vel);
         rabbitObj.lookAt(targetPos);
      }
      rabbitObj.position.add(rabbitObj.userData.vel.clone().multiplyScalar(delta)); rabbitObj.userData.vel.y -= 30 * delta;
      if(rabbitObj.position.y < 0) { rabbitObj.position.y = 0; rabbitObj.userData.vel.y = 0; rabbitObj.userData.vel.x *= 0.9; rabbitObj.userData.vel.z *= 0.9; }
      rabbitObj.position.x = Math.max(WORLD_MIN, Math.min(WORLD_MAX, rabbitObj.position.x)); rabbitObj.position.z = Math.max(WORLD_MIN, Math.min(WORLD_MAX, rabbitObj.position.z));
      
      const rw = Math.sin(now * 20);
      rabbitObj.userData.parts.earL.rotation.x = rw * 0.2; rabbitObj.userData.parts.earR.rotation.x = -rw * 0.2;
      if(rabbitObj.position.y > 0) { rabbitObj.userData.parts.legBL.rotation.x = -0.5; rabbitObj.userData.parts.legBR.rotation.x = -0.5; } 
      else { rabbitObj.userData.parts.legBL.rotation.x = 0; rabbitObj.userData.parts.legBR.rotation.x = 0; }
  }

  targets.forEach(t => {
    const mob = t.obj; const distToPlayer = mob.position.distanceTo(camera.position); const home = mob.userData.home || mob.position.clone();
    if (distToPlayer > MOB_PLAYER_MAX_DIST) { const dirHome = home.clone().sub(mob.position); if (dirHome.length() > 0.001) { dirHome.normalize(); mob.position.add(dirHome.multiplyScalar(8 * delta)); } else { mob.position.copy(home); } }

    if (difficulty !== 'easy' && peaceTimer <= 0 && distToPlayer < 8) mob.userData.isAggro = true;
    else if (peaceTimer > 0 || difficulty === 'easy') mob.userData.isAggro = false;

    if(mob.userData.isAggro && !isQuizActive) {
      mob.userData.aggroTimer -= delta; if (mob.userData.aggroTimer <= 0) mob.userData.isAggro = false;
      mob.lookAt(camera.position.x, 0, camera.position.z);
      if(distToPlayer > 2.0) { mob.translateZ(6 * delta); } else {
        if(Math.random() < 0.04) {
          health--; const hearts = document.querySelectorAll('.heart');
          for(let i=hearts.length-1; i>=0; i--) { if(!hearts[i].classList.contains('lost')) { hearts[i].classList.add('lost'); break; } }
          document.getElementById('damage-overlay').style.opacity = 0.5; setTimeout(() => document.getElementById('damage-overlay').style.opacity = 0, 100);
          playSound('hit'); if(health <= 0) { isDead = true; document.exitPointerLock(); document.getElementById('game-over').style.display = 'flex'; }
        }
      }
    } else {
      mob.userData.walkTimer -= delta;
      if(mob.userData.walkTimer <= 0) {
        mob.userData.walkTimer = Math.random() * 3 + 1; const toHome = home.clone().sub(mob.position); const dHome = toHome.length();
        if (dHome > MOB_HOME_RADIUS) { mob.userData.walkDir = toHome.normalize(); } else { mob.userData.walkDir = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(); }
      }
      if(!isQuizActive) { mob.lookAt(mob.position.clone().add(mob.userData.walkDir)); mob.translateZ(1.5 * delta); }
    }

    mob.position.x = Math.max(WORLD_MIN + MOB_WORLD_CLAMP_MARGIN, Math.min(WORLD_MAX - MOB_WORLD_CLAMP_MARGIN, mob.position.x));
    mob.position.z = Math.max(WORLD_MIN + MOB_WORLD_CLAMP_MARGIN, Math.min(WORLD_MAX - MOB_WORLD_CLAMP_MARGIN, mob.position.z));
    const p = mob.userData.parts; const w = Math.sin(now * (mob.userData.isAggro ? 15 : 5));
    if(mob.userData.type !== 'skeleton') { p.armL.rotation.x = w; p.armR.rotation.x = -w; } p.legL.rotation.x = -w; p.legR.rotation.x = w;
  });

  bonuses.forEach(b => b.rotation.y += 0.02); items.forEach(i => i.rotation.y += 0.02);
  eggs.forEach(e => { e.rotation.y += 0.02; e.position.y = 0.7 + Math.sin(now * 2 + e.id)*0.2; });
  for(let i=particles.length-1; i>=0; i--) {
    const p = particles[i]; p.m.position.add(p.v); p.v.y -= 0.01; if(p.m.position.y < 0) { scene.remove(p.m); particles.splice(i,1); }
  }
  renderer.render(scene, camera);
}

document.body.addEventListener('click', (e) => { 
  if(gameStarted && audioCtx.state === 'suspended') audioCtx.resume(); 
  if(gameStarted && !isDead && !isQuizActive) document.body.requestPointerLock(); 
});

(async () => { await loadLevelData(); })();
</script>
